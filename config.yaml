# TriadRank ATS Configuration
# 3-Tier Resume Scoring and Ranking System

# ============================================
# MODEL PATHS AND SETTINGS
# ============================================
models:
  # Model 1: Cross-Encoder (Deep Ranking)
  cross_encoder:
    name: "cross_encoder"
    pretrained_model: "bert-base-uncased"
    max_seq_length: 384  # reduced from 512: O(n²) attention → 2.25× less compute
    hidden_size: 768
    dropout: 0.1
    regression_head_units: 256
    classification_head_units: 128
    num_classes: 3  # Good Fit, Potential Fit, Bad Fit
    learning_rate: 2e-5
    weight_decay: 0.01
    warmup_steps: 500
    epochs: 20
    batch_size: 16 
    eval_batch_size: 32
    gradient_accumulation_steps: 4  # was 4; higher batch_size means fewer accum steps needed
    fp16: true
    torch_compile: true   # PyTorch 2.0+ kernel fusion (~20-30% speedup)
    fused_adam: false      # fused AdamW kernel (~5-10% optimizer speedup)
    early_stopping_patience: 5  
    # B1: must match the path the training script writes (train_cross_encoder.py
    # saves best_model.pt under checkpoints/cross_encoder/). Inference reads this.
    save_path: "checkpoints/cross_encoder/best_model.pt"

  # Model 2: Category Encoder (Gatekeeper)
  category_encoder:
    name: "category_encoder"
    pretrained_model: "distilbert-base-uncased"
    max_seq_length: 256
    hidden_size: 768
    dropout: 0.1
    num_classes: 24
    learning_rate: 3e-5
    weight_decay: 0.01
    warmup_steps: 200
    epochs: 10
    batch_size: 32
    eval_batch_size: 64
    gradient_accumulation_steps: 2
    fp16: false
    early_stopping_patience: 3
    # B1: must match the path the training script writes (train_category.py saves
    # best_model.pt under checkpoints/category_encoder/). Inference reads this.
    save_path: "checkpoints/category_encoder/best_model.pt"

  # Model 3: Extractor & Miner
  extractor:
    name: "extractor"
    model_type: "spacy"  # or "bilstm_crf"
    # B6: this is the BASE spaCy model to fine-tune FROM (must exist on disk).
    # The trained output dir checkpoints/extractor/extractor_model is written by
    # train_extractor.py via nlp.to_disk(); it is NOT a loadable base model.
    spacy_model: "en_core_web_sm"
    hidden_size: 128
    num_layers: 2
    dropout: 0.1
    learning_rate: 1e-4
    epochs: 50
    batch_size: 32
    save_path: "models/extractor.pt"

# ============================================
# INFERENCE SETTINGS
# ============================================
inference:
  device: "cuda"  # "cuda", "cpu", or "auto"
  batch_size: 32
  num_workers: 4
  pin_memory: true
  top_k: 50  # Number of candidates to pass from Tier 3 to Tier 2
  threshold_score: 0.3  # Minimum score threshold for ranking
  timeout_seconds: 300  # Maximum inference time
  tier3:
    use_skill_overlap: true   # re-enabled with SkillNer
    keyword_weight: 0.3
    skill_weight: 0.7
    enable_custom_rules: true
    skill_extractor_mode: "trie"  # "trie" | "regex" | "skillner" | "hf_ner"

  # Final-score blending. The cross-encoder alone collapses to ~0.46 for every
  # pair (training data has no negatives — see ANALYSIS_REPORT.md), so raw_score
  # alone produces no ranking signal. The "weighted" mode blends three signals:
  #   content_overlap — skill + keyword Jaccard (content-based, real spread)
  #   category        — penalty_factor (1.0 match / 0.75 similar / 0.5 mismatch)
  #   cross_encoder   — raw BERT score (collapsed, but keeps a little signal)
  # Switch to "legacy" to restore raw_score * penalty_factor for A/B comparison.
  scoring:
    mode: "weighted"
    weights:
      content_overlap: 0.50
      category: 0.30
      cross_encoder: 0.20

# ============================================
# PENALTY WEIGHTS
# ============================================
penalties:
  category_mismatch: 0.5  # Fallback penalty for unrelated categories
  low_confidence: 0.8     # Penalty for low model confidence
  missing_skills: 0.7     # Penalty for missing required skills
  experience_gap: 0.85    # Penalty for experience mismatch
  # Soft similarity penalties: higher = more similar (applied when a resume's
  # predicted category doesn't match the target but is related).
  # Format: "PREDICTED_CATEGORY,TARGET_CATEGORY": penalty_factor
  # The code checks both orderings, so define each pair once.
  category_similarity:
    # Finance cluster
    "FINANCE,ACCOUNTANT": 0.85
    "FINANCE,BANKING": 0.80
    "ACCOUNTANT,BANKING": 0.80
    # Engineering-adjacent cluster
    "INFORMATION-TECHNOLOGY,ENGINEERING": 0.75
    "ENGINEERING,CONSTRUCTION": 0.70
    "ENGINEERING,AUTOMOBILE": 0.65
    "ENGINEERING,AVIATION": 0.65
    # Healthcare / wellness
    "HEALTHCARE,FITNESS": 0.70
    # Creative cluster
    "ARTS,DESIGNER": 0.80
    "ARTS,DIGITAL-MEDIA": 0.75
    "DESIGNER,DIGITAL-MEDIA": 0.80
    "APPAREL,DESIGNER": 0.55
    # Business operations cluster
    "HUMAN-RESOURCES,BPO": 0.75
    "HUMAN-RESOURCES,BUSINESS-DEVELOPMENT": 0.70
    "BPO,BUSINESS-DEVELOPMENT": 0.70
    # Revenue / communication cluster
    "SALES,BUSINESS-DEVELOPMENT": 0.80
    "SALES,PUBLIC-RELATIONS": 0.70
    "BUSINESS-DEVELOPMENT,PUBLIC-RELATIONS": 0.70
    "ADVOCATE,PUBLIC-RELATIONS": 0.70
    # Education / people
    "TEACHER,HUMAN-RESOURCES": 0.55
    # Consulting
    "CONSULTANT,BUSINESS-DEVELOPMENT": 0.60

