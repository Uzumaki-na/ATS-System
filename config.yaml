# ============================================
# ENTITY TYPES FOR EXTRACTION
# ============================================
entity_types:
  skills:
    - "programming_language"
    - "framework"
    - "database"
    - "tool"
    - "soft_skill"
    - "certification"
  experience:
    - "company"
    - "job_title"
    - "duration"
    - "description"
  education:
    - "degree"
    - "institution"
    - "field_of_study"
    - "graduation_date"
  personal:
    - "name"
    - "email"
    - "phone"
    - "location"
    - "linkedin"

# ============================================
# DATA PATHS
# ============================================
data:
  raw:
    # Model 1: Cross-Encoder Data (Resume-JD pairs with compatibility scores)
    # Source: nonameee12233/job-resume-matching (HuggingFace, MIT license)
    # 122K pairs with final_score (0.43-0.76), label_strength, 6 scoring dims
    cross_encoder:
      train: "datasets/score dataset/split/train.csv"
      validation: "datasets/score dataset/split/val.csv"
      # Schema: resume_text, job_description, ats_score, label, label_name

    # Model 2: Category Encoder Data (Resume classification, 24 categories)
    # Source: swamy1418/Resume_Categorization (HuggingFace, 2484 resumes)
    category_csv: "datasets/category_resumes/Resume.csv"
    # Schema: ID, Resume_str, Resume_html, Category
    # Note: HUMAN-RESOURCES in config = HR in original dataset (already mapped in CSV)

    # Model 3: Extractor & Retrieval Data (Bi-Encoder Retrieval Dataset)
    extraction_pairs: "datasets/bi encoder retrieval dataset/resume_data_for_ranking.csv"
    # Schema: career_objective, skills, positions, work_experience, education, etc.

  processed:
    cross_encoder_pairs: "data/processed/cross_encoder_pairs.pt"
    category_data: "data/processed/category_data.pt"
    extraction_data: "data/processed/extraction_data.pt"
    pdf_text_cache: "data/processed/pdf_text_cache.json"
  cache: "data/cache"
  logs: "logs"

# ============================================
# PDF PROCESSING SETTINGS
# ============================================
pdf_processing:
  enabled: true
  extract_images: false  # Set true if resumes contain image-based text
  min_text_length: 50    # Minimum characters to consider valid extraction
  cache_enabled: true    # Cache extracted text to avoid reprocessing
  supported_formats:
    - ".pdf"
  extraction_method: "pypdf"  # pypdf, pdfplumber, or "auto" for best available

# ============================================
# DATASET SCHEMAS AND FORMATS
# ============================================
dataset_schemas:
  cross_encoder:
    text_column: "text"  # fallback if resume_column/job_description_column not set
    # B2: dedicated columns for resume-JD pairs (HuggingFace job-resume-matching dataset).
    # When set, these are read directly instead of the ' SEP '-embedded text_column.
    resume_column: "resume_text"
    job_description_column: "job_description"
    score_column: "ats_score"
    label_column: "label"  # numeric 0/1/2
    # Labels are: 0=bad_fit, 1=potential_fit, 2=good_fit
    label_mapping:
      bad_fit: 0
      potential_fit: 1
      good_fit: 2

  category_encoder:
    id_column: "ID"
    resume_text_column: "Resume_str"
    resume_html_column: "Resume_html"
    category_column: "Category"
    # Note: dataset has 'HR' which maps to 'HUMAN-RESOURCES' in config.categories

  extractor:
    # Columns to extract and use for retrieval
    text_columns:
      - "career_objective"
      - "skills"
      - "work_experience"
      - "education"
      - "positions"
      - "companies"
      - "project_details"
    id_column: "ID"

# ============================================
# HARD NEGATIVE MINING SETTINGS
# ============================================
hard_negative_mining:
  enabled: true
  similarity_threshold: 0.7  # Consider negatives with similarity above this
  max_negatives_per_positive: 5
  mining_batch_size: 1000
  use_gpu: true

# ============================================
# LOGGING SETTINGS
# ============================================
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/training.log"
  max_file_size: "100MB"
  backup_count: 5

# ============================================
# EVALUATION METRICS
# ============================================
evaluation:
  cross_encoder:
    metrics:
      - "mse"
      - "mae"
      - "accuracy"
      - "f1_macro"
      - "f1_weighted"
    thresholds:
      good_fit: 0.75
      potential_fit: 0.5
  category_encoder:
    metrics:
      - "accuracy"
      - "f1_macro"
      - "f1_weighted"
      - "confusion_matrix"
  extractor:
    metrics:
      - "precision"
      - "recall"
      - "f1"
      - "entity_accuracy"

# ============================================
# MLFLOW TRACKING SETTINGS
# ============================================
mlflow:
  tracking_uri: "sqlite:///mlflow.db"  # SQLite backend; use "http://<host>:5000" for remote server
  experiment_name_prefix: ""  # optional prefix, e.g. "dev-" or "prod-"
  pytorch_autolog: false  # enable mlflow.pytorch.autolog() for automatic metric capture
  # artifact_location:  # optional override; defaults to <tracking_uri>/<experiment_id>/artifacts
  register_models: true  # auto-register best models in Model Registry

# ============================================
# API SETTINGS
# ============================================
api:
  host: "0.0.0.0"
  port: 8000
  debug: false
  workers: 4
  cors_origins:
    - "*"
  rate_limit: 100  # requests per minute

# ============================================
# DOCKER SETTINGS
# ============================================
docker:
  base_image: "python:3.10-slim"
  python_packages:
    - "mlflow>=3.0.0"
    - "torch>=2.0.0"
    - "transformers>=4.30.0"
    - "fastapi>=0.100.0"
    - "spacy>=3.6.0"
    - "scikit-learn>=1.3.0"
    - "pandas>=2.0.0"
    - "numpy>=1.24.0"
  gpu_enabled: true
