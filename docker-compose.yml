# TriadRank ATS — single CPU inference service.
#
# Configure in .env (gitignored; copy from .env.example):
#   HF_TOKEN                 — read-scope token for the private checkpoint repos
#   CHECKPOINT_REPO_CROSS    — e.g. Akuma1da/cross-encoder
#   CHECKPOINT_REPO_CATEGORY — e.g. Akuma1da/category-encoder
#
# Trained checkpoints + base transformers models are fetched at first start into
# the `hf-cache` named volume (mounts onto HF_HOME) and reused on every restart,
# so the cold-download cost is paid exactly once per host.

services:
  triadrank-ats:
    build:
      context: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      MODEL_DEVICE: cpu
      UVICORN_WORKERS: 1
    volumes:
      - hf-cache:/opt/hf-cache
    restart: unless-stopped
    # HEALTHCHECK lives in the Dockerfile (single source of truth); it returns
    # unhealthy when /health serves 503 (pipeline not ready, or random fallback).

volumes:
  hf-cache:
